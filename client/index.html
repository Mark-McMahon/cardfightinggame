    <title>Auto-Battler</title>
    <!-- Cozy Tavern faces (design-spec §10): Cinzel = engraved display, Crimson Pro = card/body serif,

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800;900&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- styles.css is imported by main.tsx so Vite bundles + hashes it in the build. -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
